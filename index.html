<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DaMaNi Pinterest</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f6f3f1;color:#222}
    main{max-width:1100px;margin:0 auto;padding:32px 20px}
    h1{margin:0 0 8px} p{margin:0 0 24px;color:#666}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
    figure{margin:0;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.08)}
    img{display:block;width:100%;height:auto}
    figcaption{padding:12px 14px;font-size:14px}
  </style>
</head>
<body>
<main>
  <h1>DaMaNi Pinterest</h1>
  <p>Ажурные черные 3D-бабочки — галерея изображений для Pinterest.</p>
  <div class="grid">
    <figure><img src="living-room-wall-decor.png" alt="Бабочки в гостиной"><figcaption>Гостиная</figcaption></figure>
    <figure><img src="bedroom-wall-decor.png" alt="Бабочки в спальне"><figcaption>Спальня</figcaption></figure>
    <figure><img src="mirror-console-decor.png" alt="Бабочки у зеркала"><figcaption>Зеркало и консоль</figcaption></figure>
    <figure><img src="japandi-console-wall-decor.png" alt="Бабочки в интерьере Japandi"><figcaption>Japandi</figcaption></figure>
    <figure><img src="home-office-wall-decor.png" alt="Бабочки в домашнем кабинете"><figcaption>Домашний кабинет</figcaption></figure>
  </div>
</main>
</body>
</html>
